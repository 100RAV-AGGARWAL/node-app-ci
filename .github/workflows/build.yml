name: Build

on:
  push:
    branches:
      - main
      - development
  pull_request:

permissions:
  contents: read

jobs:
  build-development:
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create development env file
        env:
          GITHUB_VARS_JSON: ${{ toJson(vars) }}
        run: npm run env:create:dev

      - name: Build
        run: npm run build
