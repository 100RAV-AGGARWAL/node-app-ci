name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Format, lint, and test coverage
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Create test env file
        env:
          GITHUB_VARS_JSON: ${{ toJson(vars) }}
        run: npm run env:create:test

      - name: 1. Format check
        run: npm run format:check

      - name: 2. Lint check
        run: npm run lint

      - name: 3. Test coverage
        run: npm run test:coverage
  
  build-development:
    name: Build for development
    runs-on: ubuntu-latest
    needs: checks
    if: github.ref == 'refs/heads/main' && github.event_name == 'pull_request'
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create development env file
        env:
          GITHUB_VARS_JSON: ${{ toJson(vars) }}
        run: npm run env:create:dev

      - name: Build
        run: npm run build
